<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        width: 260px; margin: 0; padding: 14px 16px; color: #1c1c1e;
      }
      h1 { font-size: 15px; margin: 0 0 8px; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #c7c7cc; margin-right: 6px; vertical-align: middle; }
      .dot.up { background: #1a8917; } .dot.down { background: #d70015; }
      .status { margin: 0 0 12px; color: #6b6b70; }
      .how { background: #f2f2f7; border-radius: 8px; padding: 10px; margin: 0 0 12px; }
      kbd { background: #fff; border: 1px solid #d0d0d5; border-radius: 4px; padding: 1px 5px; font-size: 12px; }
      button {
        width: 100%; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
        color: #fff; background: #0a84ff; border: none; border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Audio Reader</h1>
    <p class="status"><span class="dot" id="dot"></span><span id="statusText">Checking server…</span></p>
    <div class="how">
      Select text, then press <kbd id="kbd">⌘⇧S</kbd> — or right-click the selection and choose <b>Read selection aloud</b>.
    </div>
    <button id="open" type="button">Settings</button>
    <script src="popup.js"></script>
  </body>
</html>
