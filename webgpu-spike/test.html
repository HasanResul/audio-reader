<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebGPU Kokoro Spike</title>
    <style>
      body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.25rem; }
      button { font: inherit; padding: 0.5rem 0.9rem; margin: 0 0.5rem 0.5rem 0; cursor: pointer; }
      #log { background: #111; color: #d6e2ff; padding: 1rem; border-radius: 8px; white-space: pre-wrap; min-height: 8rem; font-family: ui-monospace, monospace; font-size: 12.5px; }
      .verdict { padding: 0.75rem 1rem; border-radius: 8px; margin: 1rem 0; font-weight: 600; }
      .pass { background: #0f2e16; color: #74e08a; }
      .fail { background: #341414; color: #ff8a8a; }
      .docker { color: #888; }
    </style>
  </head>
  <body>
    <h1>WebGPU Kokoro Spike</h1>
    <p>
      Proves Kokoro runs with WebGPU inside an MV3 <strong>offscreen document</strong> and benchmarks it.
      Docker baseline on this machine: <span class="docker">~4.3–4.9× real-time (CPU/ONNX)</span>.
      First run downloads ~82&nbsp;MB of weights (cached after).
    </p>
    <div>
      <button id="webgpu">Run WebGPU (fp32)</button>
      <button id="wasm">Run WASM fallback (q8)</button>
    </div>
    <div id="verdict"></div>
    <div id="player"></div>
    <pre id="log">idle.</pre>

    <script src="test.js"></script>
  </body>
</html>
